<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Notas - Exame de Faixa</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 5px;
        }
        h1 { font-size: 1.6rem; }
        h2 {
            font-size: 1rem;
            color: #666;
            margin-bottom: 25px;
        }
        
        /* Ajustes de Responsividade para a Tabela */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; /* Garante que a tabela não esmague em telas muito pequenas */
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 0.9rem;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        input[type="number"] {
            width: 60px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 0.9rem;
        }
        .media-final {
            font-weight: bold;
            color: #2c3e50;
            font-size: 1rem;
        }
        
        /* Botões */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        button {
            width: 100%;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
        }
        .btn-calcular {
            background-color: #27ae60;
        }
        .btn-calcular:hover {
            background-color: #219150;
        }
        .btn-email {
            background-color: #2980b9;
        }
        .btn-email:hover {
            background-color: #2471a3;
        }

        /* Telas maiores (Tablets e Desktops) */
        @media (min-width: 600px) {
            body { padding: 20px; }
            .container { padding: 30px; }
            h1 { font-size: 2rem; }
            h2 { font-size: 1.2rem; }
            .btn-container {
                flex-direction: row;
                gap: 15px;
            }
            button {
                width: auto;
                padding: 12px 30px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Associação Atarashii Karatê-Do Shotokan</h1>
    <h2>Avaliação de Exame de Faixa</h2>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Nome do Aluno</th>
                    <th>Sensei Vinicius</th>
                    <th>Sensei Guilherme</th>
                    <th>Sensei Tamires</th>
                    <th>Média Final</th>
                </tr>
            </thead>
            <tbody>
                <tr class="linha-aluno">
                    <td class="nome-aluno">Lúcia Correa</td>
                    <td><input type="number" class="nota1" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota2" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota3" min="0" max="10" step="0.1" value="0"></td>
                    <td class="media-final">0.0</td>
                </tr>
                <tr class="linha-aluno">
                    <td class="nome-aluno">Sofia Ferreira</td>
                    <td><input type="number" class="nota1" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota2" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota3" min="0" max="10" step="0.1" value="0"></td>
                    <td class="media-final">0.0</td>
                </tr>
                <tr class="linha-aluno">
                    <td class="nome-aluno">Arthur Penna</td>
                    <td><input type="number" class="nota1" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota2" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota3" min="0" max="10" step="0.1" value="0"></td>
                    <td class="media-final">0.0</td>
                </tr>
                <tr class="linha-aluno">
                    <td class="nome-aluno">Mauricio Cerqueira</td>
                    <td><input type="number" class="nota1" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota2" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota3" min="0" max="10" step="0.1" value="0"></td>
                    <td class="media-final">0.0</td>
                </tr>
                <tr class="linha-aluno">
                    <td class="nome-aluno">Klara Pereira</td>
                    <td><input type="number" class="nota1" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota2" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota3" min="0" max="10" step="0.1" value="0"></td>
                    <td class="media-final">0.0</td>
                </tr>
                <tr class="linha-aluno">
                    <td class="nome-aluno">Adriano Miguel</td>
                    <td><input type="number" class="nota1" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota2" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota3" min="0" max="10" step="0.1" value="0"></td>
                    <td class="media-final">0.0</td>
                </tr>
                <tr class="linha-aluno">
                    <td class="nome-aluno">Luiz Guilherme</td>
                    <td><input type="number" class="nota1" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota2" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota3" min="0" max="10" step="0.1" value="0"></td>
                    <td class="media-final">0.0</td>
                </tr>
                <tr class="linha-aluno">
                    <td class="nome-aluno">Edson Fernandes</td>
                    <td><input type="number" class="nota1" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota2" min="0" max="10" step="0.1" value="0"></td>
                    <td><input type="number" class="nota3" min="0" max="10" step="0.1" value="0"></td>
                    <td class="media-final">0.0</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="btn-container">
        <button class="btn-calcular" onclick="calcularMedias()">Calcular Médias</button>
        <button class="btn-email" onclick="enviarEmail()">Enviar por E-mail</button>
    </div>
</div>

<script>
    function calcularMedias() {
        const linhas = document.querySelectorAll('.linha-aluno');
        linhas.forEach(linha => {
            const n1 = parseFloat(linha.querySelector('.nota1').value) || 0;
            const n2 = parseFloat(linha.querySelector('.nota2').value) || 0;
            const n3 = parseFloat(linha.querySelector('.nota3').value) || 0;

            const media = (n1 + n2 + n3) / 3;
            linha.querySelector('.media-final').textContent = media.toFixed(2);
        });
    }

    function enviarEmail() {
        // Garante que as médias estejam atualizadas antes de gerar o texto do e-mail
        calcularMedias();

        const linhas = document.querySelectorAll('.linha-aluno');
        let corpoEmail = "Relatório de Notas - Exame de Faixa\n";
        corpoEmail += "Associação Atarashii Karatê-Do Shotokan\n";
        corpoEmail += "=========================================\n\n";
        corpoEmail += "Professores Avaliadores:\n";
        corpoEmail += "- Sensei Vinicius\n- Sensei Guilherme\n- Sensei Tamires\n\n";
        corpoEmail += "Notas dos Alunos:\n";
        corpoEmail += "-----------------------------------------\n";

        linhas.forEach(linha => {
            const nome = linha.querySelector('.nome-aluno').textContent;
            const n1 = linha.querySelector('.nota1').value || '0';
            const n2 = linha.querySelector('.nota2').value || '0';
            const n3 = linha.querySelector('.nota3').value || '0';
            const media = linha.querySelector('.media-final').textContent;

            corpoEmail += `Aluno(a): ${nome}\n`;
            corpoEmail += `  - Sensei Vinicius: ${n1}\n`;
            corpoEmail += `  - Sensei Guilherme: ${n2}\n`;
            corpoEmail += `  - Sensei Tamires: ${n3}\n`;
            corpoEmail += `  - MÉDIA FINAL: ${media}\n`;
            corpoEmail += "-----------------------------------------\n";
        });

        const assunto = encodeURIComponent("Notas Exame de Faixa - Atarashii Karatê-Do");
        const corpoFormatado = encodeURIComponent(corpoEmail);
		
		
    // Abre o aplicativo de email com Destinatário, Assunto e Corpo preenchidos
    window.open(`mailto:luedo25@msn.com?subject=${assunto}&body=${corpoFormatado}`, '_self');
    }
	
</script>

</body>
</html>
